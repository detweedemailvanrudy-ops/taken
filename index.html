<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskMaster Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <meta name="theme-color" content="#4A90E2">
</head>
<body>
    <div id="side-menu" class="sidebar">
        <div class="sidebar-header">
            <h3>Menu</h3>
            <button class="icon-btn" onclick="toggleMenu()"><span class="material-icons">close</span></button>
        </div>
        <nav class="sidebar-nav">
            <button onclick="showView('planning')"><span class="material-icons">event_note</span> Planning</button>
            <button onclick="showView('add-task')"><span class="material-icons">add_task</span> Nieuwe Taak</button>
            <button onclick="showView('categories')"><span class="material-icons">category</span> Categorieën</button>
            <button onclick="showView('completed')"><span class="material-icons">task_alt</span> Voltooid</button>
        </nav>
    </div>
    <div class="sidebar-overlay" onclick="toggleMenu()"></div>

    <header>
        <button class="icon-btn" onclick="toggleMenu()"><span class="material-icons">menu</span></button>
        <h1 id="view-title">Planning</h1>
        <div></div> </header>

    <main id="app">
        <section id="view-planning" class="app-view">
            <div id="task-list"></div>
            <hr>
            <h3>Backlog (Ongepland)</h3>
            <div id="backlog-list"></div>
        </section>

        <section id="view-add-task" class="app-view" style="display:none;">
            <div class="card add-form">
                <input type="text" id="task-title" placeholder="Wat moet er gebeuren?">
                <select id="task-category"></select>
                <button class="btn btn-primary" onclick="saveTask()">
                    <span class="material-icons">save</span> Taak Opslaan
                </button>
            </div>
        </section>

        <section id="view-categories" class="app-view" style="display:none;">
            <div class="card">
                <div class="cat-input-group">
                    <input type="text" id="new-cat-title" placeholder="Naam...">
                    <div class="color-picker-wrapper">
                        <input type="color" id="new-cat-color" value="#4A90E2">
                    </div>
                    <button class="btn-icon-round" onclick="addCategory()">
                        <span class="material-icons">add</span>
                    </button>
                </div>
                <div id="category-edit-list"></div>
            </div>
        </section>

        <section id="view-completed" class="app-view" style="display:none;">
            <div id="completed-list"></div>
        </section>
    </main>

    <div id="planning-modal" class="modal">
        <div class="modal-content">
            <h3>Wanneer inplannen?</h3>
            <input type="datetime-local" id="plan-date">
            <input type="hidden" id="plan-task-id">
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="confirmPlan()">Opslaan</button>
                <button class="btn btn-secondary" onclick="closePlanningModal()">Annuleren</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
