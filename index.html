<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskMaster Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <meta name="theme-color" content="#4A90E2">
</head>
<body>
    <div id="side-menu" class="sidebar">
        <div class="sidebar-header">
            <h3>Menu</h3>
            <button class="icon-btn" style="color:var(--text)" onclick="toggleMenu()"><span class="material-icons">close</span></button>
        </div>
        <nav class="sidebar-nav">
            <button onclick="showView('planning')"><span class="material-icons">event_note</span> Planning</button>
            <button onclick="showView('manage')"><span class="material-icons">list_alt</span> Takenbeheer</button>
            <button onclick="showView('categories')"><span class="material-icons">category</span> Categorieën</button>
            <button onclick="showView('completed')"><span class="material-icons">task_alt</span> Voltooid</button>
        </nav>
    </div>
    <div class="sidebar-overlay" onclick="toggleMenu()"></div>

    <header>
        <button class="icon-btn" onclick="toggleMenu()"><span class="material-icons">menu</span></button>
        <h1 id="view-title">Planning</h1>
        <div style="width:44px"></div>
    </header>

    <main id="app">
        <section id="view-planning" class="app-view">
            <div class="sort-bar">
                <span>Sorteer op:</span>
                <select id="sort-select" onchange="renderAll()">
                    <option value="date">Datum (Tijd)</option>
                    <option value="cat">Categorie</option>
                    <option value="alpha">Alfabetisch</option>
                </select>
            </div>
            <div id="task-list"></div>
        </section>

        <section id="view-manage" class="app-view" style="display:none;">
            <div id="manage-all-list"></div>
        </section>

        <section id="view-categories" class="app-view" style="display:none;">
            <div class="card">
                <h3>Nieuwe Categorie</h3>
                <div class="cat-input-group">
                    <input type="text" id="new-cat-title" placeholder="Naam...">
                    <div class="color-picker-wrapper">
                        <input type="color" id="new-cat-color" value="#4A90E2">
                    </div>
                    <button class="btn-icon-round" onclick="addCategory()">
                        <span class="material-icons">add</span>
                    </button>
                </div>
                <div id="category-edit-list"></div>
            </div>
        </section>

        <section id="view-completed" class="app-view" style="display:none;">
            <div id="completed-list"></div>
        </section>
        
        <button class="fab" onclick="openNewTaskModal()">
            <span class="material-icons">add</span>
        </button>
    </main>

    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-task-title">Nieuwe Taak</h3>
            <input type="hidden" id="edit-task-id">
            <input type="text" id="task-title-input" placeholder="Wat gaan we doen?">
            <select id="task-category-select"></select>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="handleSaveTask()">Opslaan</button>
                <button class="btn btn-secondary" onclick="closeModal()">Annuleren</button>
            </div>
        </div>
    </div>

    <div id="planning-modal" class="modal">
        <div class="modal-content">
            <h3>Wanneer inplannen?</h3>
            <input type="datetime-local" id="plan-date">
            <input type="hidden" id="plan-task-id">
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="confirmPlan()">Bevestigen</button>
                <button class="btn btn-secondary" onclick="closePlanningModal()">Sluiten</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
