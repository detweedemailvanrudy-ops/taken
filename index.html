<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskMaster Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#4A90E2">
</head>
<body>
    <div id="side-menu" class="sidebar">
        <div class="sidebar-header">
            <h3>Instellingen</h3>
            <button onclick="toggleMenu()">×</button>
        </div>
        <div class="sidebar-content">
            <h4>Categorie Beheer</h4>
            <div class="cat-input-group">
                <input type="text" id="new-cat-title" placeholder="Naam...">
                <div class="color-picker-wrapper">
                    <input type="color" id="new-cat-color" value="#4A90E2">
                </div>
                <button onclick="addCategory()">+</button>
            </div>
            <div id="category-edit-list"></div>
        </div>
    </div>

    <header>
        <button id="menu-btn" onclick="toggleMenu()">☰</button>
        <h1>TaskMaster Pro</h1>
        <button id="add-task-btn">+</button>
    </header>

    <main id="app">
        <section id="task-section">
            <h2>Planning</h2>
            <div id="task-list"></div>
        </section>

        <section id="backlog-section">
            <h2>Backlog</h2>
            <div id="backlog-list"></div>
        </section>

        <section id="completed-section">
            <h2>Voltooid</h2>
            <div id="completed-list"></div>
        </section>
    </main>

    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h3>Nieuwe Taak</h3>
            <input type="text" id="task-title" placeholder="Wat moet er gebeuren?">
            <select id="task-category"></select>
            <div class="modal-actions">
                <button class="btn-primary" onclick="saveTask()">Opslaan</button>
                <button class="btn-secondary" onclick="closeModal()">Annuleren</button>
            </div>
        </div>
    </div>

    <div id="planning-modal" class="modal">
        <div class="modal-content">
            <h3>Datum kiezen</h3>
            <input type="datetime-local" id="plan-date">
            <input type="hidden" id="plan-task-id">
            <div class="modal-actions">
                <button class="btn-primary" onclick="confirmPlan()">Bevestigen</button>
                <button class="btn-secondary" onclick="closePlanningModal()">Annuleren</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
