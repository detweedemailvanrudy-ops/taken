<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fff7ed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Takkie">
  <title>Takkie</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div class="logo">Takkie<span>.</span></div>
    <button class="add-btn" id="addBtn" aria-label="Nieuwe taak">+</button>
  </header>

  <div class="filter-bar" id="filterBar"></div>

  <main id="main"></main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h2 id="modalTitle">Nieuwe taak</h2>
      <input id="taskInput" type="text" placeholder="Wat moet er gedaan worden?" maxlength="80" autocomplete="off" />
      <div class="color-row" id="colorRow"></div>
      <div class="modal-btns">
        <button class="btn-secondary" id="cancelBtn">Annuleren</button>
        <button class="btn-primary" id="saveBtn">Opslaan</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
